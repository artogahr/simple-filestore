<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simple-filestore</title>
  <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div class="flex items-center justify-center min-h-screen px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-100 rounded-2xl mb-4">
        <svg class="w-7 h-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-800">simple-filestore</h1>
      <p class="text-gray-500 text-sm mt-1">Enter your folder name to continue</p>
    </div>
    <form method="POST" action="/login" class="bg-white shadow-sm rounded-2xl p-6 space-y-4 border border-gray-200">
      {{if .Error}}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2">{{.Error}}</div>
      {{end}}
      <div>
        <label for="folder" class="block text-sm font-medium text-gray-700 mb-1.5">Folder name</label>
        <input
          id="folder"
          name="folder"
          type="text"
          autocomplete="off"
          autofocus
          required
          placeholder="e.g. my-team"
          class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl px-4 py-2.5 text-sm transition-colors">
        Open folder →
      </button>
    </form>
    <p class="text-center text-xs text-gray-400 mt-5">
      <a href="/admin/login" class="hover:text-gray-600 transition-colors">Admin panel</a>
    </p>
  </div>
</div>
</body>
</html>
