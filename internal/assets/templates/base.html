{{/* Reusable partials — included by all page templates */}}

{{define "html-head"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/css/output.css">
  <script defer src="/static/js/alpine.min.js"></script>
  <script src="/static/js/htmx.min.js"></script>
  <style>[x-cloak]{display:none}</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
{{end}}

{{define "html-foot"}}
</body>
</html>
{{end}}

{{define "user-header"}}
<header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
  <div class="flex items-center gap-3">
    <span class="font-semibold text-gray-800">📁 {{.Folder}}</span>
  </div>
  <div class="flex items-center gap-2 text-sm">
    <a href="/trash" class="text-gray-500 hover:text-gray-800 px-2 py-1 rounded hover:bg-gray-100">Trash</a>
    <a href="/logout" class="text-gray-500 hover:text-gray-800 px-2 py-1 rounded hover:bg-gray-100">Sign out</a>
    <span class="text-gray-300 text-xs select-none">{{version}}</span>
  </div>
</header>
{{end}}
