<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — simple-filestore</title>
  <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div class="flex items-center justify-center min-h-screen px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-gray-100 rounded-2xl mb-4">
        <svg class="w-7 h-7 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-800">Admin panel</h1>
      <p class="text-gray-500 text-sm mt-1">simple-filestore</p>
    </div>
    <form method="POST" action="/admin/login" class="bg-white shadow-sm rounded-2xl p-6 space-y-4 border border-gray-200">
      {{if .Error}}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-2">{{.Error}}</div>
      {{end}}
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Admin password</label>
        <input
          id="password"
          name="password"
          type="password"
          autofocus
          required
          class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        >
      </div>
      <button type="submit" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-xl px-4 py-2.5 text-sm transition-colors">
        Sign in
      </button>
    </form>
    <p class="text-center text-xs text-gray-400 mt-5">
      <a href="/" class="hover:text-gray-600 transition-colors">← Back to login</a>
    </p>
  </div>
</div>
</body>
</html>
