name: CI/CD

on:
  push:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: CGO_ENABLED=0 go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Tailwind CSS
        run: |
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64 \
            -o /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss

      - name: Build
        run: |
          BASE=$(cat VERSION)
          PATCH=$(git rev-list --count HEAD)
          VERSION="v${BASE}.${PATCH}"
          tailwindcss -i ./input.css -o ./internal/assets/static/css/output.css --minify
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.Version=${VERSION}" \
            -o simple-filestore ./cmd/server
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest simple-filestore \
            --target main \
            --title "Latest (${{ env.VERSION }})" \
            --notes "Version: ${{ env.VERSION }} — built from ${{ github.sha }}"
